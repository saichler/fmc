        <!-- Header -->
        <header class="app-header">
            <!-- Header Background Illustration -->
            <svg class="header-illustration" viewBox="0 0 1920 60" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="headerNodeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.3" />
                        <stop offset="100%" style="stop-color:#0284c7;stop-opacity:0.2" />
                    </linearGradient>
                </defs>
                <!-- Decorative network lines -->
                <path d="M 0,30 Q 200,10 400,30 T 800,30" fill="none" stroke="rgba(14, 165, 233, 0.15)" stroke-width="1.5"/>
                <path d="M 1920,30 Q 1720,50 1520,30 T 1120,30" fill="none" stroke="rgba(14, 165, 233, 0.15)" stroke-width="1.5"/>
                <!-- Small animated dots -->
                <circle cx="200" cy="20" r="2" fill="rgba(14, 165, 233, 0.5)">
                    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
                </circle>
                <circle cx="600" cy="25" r="2" fill="rgba(14, 165, 233, 0.5)">
                    <animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/>
                </circle>
                <circle cx="1300" cy="40" r="2" fill="rgba(14, 165, 233, 0.5)">
                    <animate attributeName="opacity" values="0.3;1;0.3" dur="3.5s" repeatCount="indefinite"/>
                </circle>
                <circle cx="1700" cy="35" r="2" fill="rgba(14, 165, 233, 0.5)">
                    <animate attributeName="opacity" values="0.3;1;0.3" dur="4.5s" repeatCount="indefinite"/>
                </circle>
                <!-- Small server icons on edges -->
                <rect x="50" y="25" width="4" height="10" rx="1" fill="url(#headerNodeGradient)"/>
                <rect x="1860" y="25" width="4" height="10" rx="1" fill="url(#headerNodeGradient)"/>
            </svg>

            <div class="header-left">
                <img src="l8ui/images/logo.gif" alt="FitMate Coach Logo" class="header-logo">
                <div class="header-title">
                    <h1>FitMate Coach</h1>
                    <p class="header-subtitle">Coach Portal</p>
                </div>
            </div>
            <div class="header-right">
                <div class="powered-by-header">
                    <span>Powered by</span>
                    <img src="l8ui/images/Layer8Logo.gif" alt="Layer 8 Ecosystem" class="layer8-header-logo">
                    <span class="layer8-header-text">Layer 8 Ecosystem</span>
                </div>
                <div class="layer8d-theme-picker">
                    <button class="layer8d-theme-btn" onclick="Layer8DThemeSwitcher.toggleDropdown()" aria-label="Choose theme">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a7 7 0 0 0 0 20V2z"/></svg>
                    </button>
                    <div class="layer8d-theme-menu"></div>
                </div>
                <div class="user-menu">
                    <span class="username">Admin</span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
