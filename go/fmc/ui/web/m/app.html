<body>
    <div class="app-container">
        <!-- Mobile Header -->
        <header class="mobile-header">
            <button class="header-menu-btn" id="menu-toggle" aria-label="Menu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>

            <div class="header-logo">
                <img src="../l8ui/images/logo.gif" alt="FitMate Coach">
                <span class="header-logo-text">FitMate Coach</span>
            </div>

            <div class="header-actions">
                <div class="layer8d-theme-picker">
                    <button class="header-action-btn" onclick="Layer8DThemeSwitcher.toggle()" title="Toggle theme">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </button>
                </div>
                <button class="header-action-btn" id="refresh-btn" title="Refresh">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <polyline points="1 20 1 14 7 14"></polyline>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Mobile Sidebar -->
        <nav class="mobile-sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img src="../l8ui/images/logo.gif" alt="FitMate Coach">
                    <span class="sidebar-logo-text">FitMate Coach</span>
                </div>
            </div>

            <div class="sidebar-nav">
                <a href="#dashboard" class="sidebar-item active" data-section="dashboard">Dashboard</a>
                <a href="#core" class="sidebar-item" data-section="dashboard" data-module="core">Members & Coaches</a>
                <a href="#coaching" class="sidebar-item" data-section="dashboard" data-module="coaching">Coaching</a>
                <a href="#nutrition" class="sidebar-item" data-section="dashboard" data-module="nutrition">Nutrition</a>
                <a href="#progress" class="sidebar-item" data-section="dashboard" data-module="progress">Progress</a>
                <a href="#billing" class="sidebar-item" data-section="dashboard" data-module="billing">Billing</a>
                <a href="#system" class="sidebar-item" data-section="system" data-module="system">System</a>
            </div>

            <div class="sidebar-user">
                <div class="sidebar-user-info">
                    <div class="sidebar-avatar" id="user-avatar">A</div>
                    <div class="sidebar-user-details">
                        <div class="sidebar-user-name" id="user-name">Admin</div>
                        <div class="sidebar-user-role">FMC Coach Portal</div>
                    </div>
                </div>
                <button class="sidebar-logout-btn" onclick="MobileApp.logout()">Sign Out</button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div id="content-area">
                <div class="loading">Loading...</div>
            </div>
        </main>
    </div>

    <script src="../l8ui/m/js/layer8m-timeline.js"></script>
    <script src="../l8ui/m/js/layer8m-calendar.js"></script>
    <script src="../l8ui/m/js/layer8m-tree-grid.js"></script>

    <script src="../fmc-ui/core/people-forms.js"></script>
    <script src="js/core/core-index.js"></script>

    <!-- Coaching -->
