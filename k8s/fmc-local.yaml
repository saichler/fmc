apiVersion: v1
kind: Namespace
metadata:
  name: fmc
  labels:
    name: fmc

---

apiVersion: apps/v1
kind: DaemonSet
metadata:
  namespace: fmc
  name: fmc-vnet
  labels:
    app: fmc-vnet
spec:
  selector:
    matchLabels:
      app: fmc-vnet
  template:
    metadata:
      labels:
        app: fmc-vnet
    spec:
      hostNetwork: true
      containers:
        - name: fmc-vnet
          image: saichler/fmc-vnet:latest
          imagePullPolicy: Always
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          ports:
            - containerPort: 34999
          volumeMounts:
            - name: hdata
              mountPath: /data
      volumes:
        - name: hdata
          hostPath:
            path: /data
            type: DirectoryOrCreate

---

apiVersion: apps/v1
kind: DaemonSet
metadata:
  namespace: fmc
  name: fmc-log-vnet
  labels:
    app: fmc-log-vnet
spec:
  selector:
    matchLabels:
      app: fmc-log-vnet
  template:
    metadata:
      labels:
        app: fmc-log-vnet
    spec:
      hostNetwork: true
      containers:
        - name: fmc-log-vnet
          image: saichler/fmc-log-vnet:latest
          imagePullPolicy: Always
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: hdata
              mountPath: /data
      volumes:
        - name: hdata
          hostPath:
            path: /data
            type: DirectoryOrCreate

---

apiVersion: apps/v1
kind: DaemonSet
metadata:
  namespace: fmc
  name: fmc-log-agent
  labels:
    app: fmc-log-agent
spec:
  selector:
    matchLabels:
      app: fmc-log-agent
  template:
    metadata:
      labels:
        app: fmc-log-agent
    spec:
      containers:
        - name: fmc-log-agent
          image: saichler/fmc-log-agent:latest
          imagePullPolicy: Always
          env:
            - name: LOGPATH
              value: /data/logs/fmc
            - name: LOGFILE
              value: "*"
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: hdata
              mountPath: /data
      volumes:
        - name: hdata
          hostPath:
            path: /data
            type: DirectoryOrCreate

