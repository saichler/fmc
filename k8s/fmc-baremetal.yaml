# Bare-metal PVC version — requires local-path-provisioner:
#   kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/master/deploy/local-path-storage.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: fmc
  labels:
    name: fmc

---

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fmc-local-storage
provisioner: rancher.io/local-path
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: fmc
  name: fmc-vnet
  labels:
    app: fmc-vnet
spec:
  serviceName: fmc-vnet
  replicas: 3
  selector:
    matchLabels:
      app: fmc-vnet
  template:
    metadata:
      labels:
        app: fmc-vnet
    spec:
      hostNetwork: true
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: fmc-vnet
              topologyKey: kubernetes.io/hostname
      containers:
        - name: fmc-vnet
          image: saichler/fmc-vnet:latest
          imagePullPolicy: Always
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          ports:
            - containerPort: 34999
          volumeMounts:
            - name: hdata
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: hdata
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: fmc-local-storage
        resources:
          requests:
            storage: 5Gi

---

