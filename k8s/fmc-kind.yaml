# KIND cluster version — uses KIND's built-in standard StorageClass
# KIND ships with rancher/local-path-provisioner pre-installed as StorageClass "standard"
# No custom StorageClass definition needed.

apiVersion: v1
kind: Namespace
metadata:
  name: fmc
  labels:
    name: fmc

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: fmc
  name: fmc-vnet
  labels:
    app: fmc-vnet
spec:
  serviceName: fmc-vnet
  replicas: 1
  selector:
    matchLabels:
      app: fmc-vnet
  template:
    metadata:
      labels:
        app: fmc-vnet
    spec:
      hostNetwork: true
      containers:
        - name: fmc-vnet
          image: saichler/fmc-vnet:latest
          imagePullPolicy: Always
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          ports:
            - containerPort: 34999
          volumeMounts:
            - name: hdata
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: hdata
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: standard
        resources:
          requests:
            storage: 5Gi

---

